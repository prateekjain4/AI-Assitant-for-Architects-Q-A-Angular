<div class="text-center my-3">
  <h2>Bylaw Updates</h2>
</div>

<button
  class="btn btn-primary"
  (click)="checkForUpdates()"
  [disabled]="checking">

  {{ checking ? 'Checking...' : 'Check Updates' }}

</button>

<!-- Checking State -->
<div *ngIf="checking" class="mt-3">
  Checking bylaws for updates... please wait.
</div>

<!-- Results -->
<div *ngIf="!checking">

  <h3>Modified Sections</h3>

  <div *ngIf="updates.modified?.length === 0">
    No changes detected.
  </div>

  <div *ngFor="let item of updates.modified" class="card p-3 mb-3">

    <h5>{{ item.section_id }}</h5>

    <strong>{{ item.title }}</strong>

    <p>{{ item.summary }}</p>

  </div>

  <h3>New Sections</h3>

  <ul>
    <li *ngFor="let item of updates.added">
      {{ item }}
    </li>
  </ul>

  <h3>Removed Sections</h3>

  <ul>
    <li *ngFor="let item of updates.removed">
      {{ item }}
    </li>
  </ul>

</div>
