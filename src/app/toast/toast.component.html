<div class="toast-stack">
  <div
    *ngFor="let t of (toast.toasts$ | async)"
    class="toast-item"
    [class.toast-success]="t.type === 'success'"
    [class.toast-error]="t.type === 'error'"
    [class.toast-info]="t.type === 'info'">
    <span class="toast-icon">
      <!-- success checkmark -->
      <svg *ngIf="t.type === 'success'" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <!-- error X -->
      <svg *ngIf="t.type === 'error'" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <!-- info i -->
      <svg *ngIf="t.type === 'info'" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </span>
    <span class="toast-msg">{{ t.message }}</span>
    <button class="toast-close" (click)="toast.dismiss(t.id)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
</div>
