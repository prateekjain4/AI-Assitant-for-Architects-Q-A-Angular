<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand fw-bold" routerLink="/">PlanIQ</a>

  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ms-auto">

      <!-- Home -->
      <li class="nav-item">
        <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          Home
        </a>
      </li>

      <!-- Services Dropdown -->
      <li class="nav-item dropdown">
        <a 
          class="nav-link dropdown-toggle" 
          href="#" 
          id="servicesDropdown" 
          role="button" 
          data-bs-toggle="dropdown" 
          aria-expanded="false"
        >
          Services
        </a>

        <ul class="dropdown-menu dropdown-menu-end">
          <li>
            <a class="dropdown-item" routerLink="/ask">Ask AI</a>
          </li>
          <li>
            <a class="dropdown-item" routerLink="/planning">Planning Tool</a>
          </li>
        </ul>
      </li>

      <!-- About -->
      <li class="nav-item">
        <a class="nav-link" routerLink="/about" routerLinkActive="active">
          About
        </a>
      </li>

      <!-- Auth: logged out -->
      <ng-container *ngIf="!auth.isLoggedIn">
        <li class="nav-item">
          <a class="nav-link" routerLink="/login" routerLinkActive="active">Sign In</a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-signup-btn" routerLink="/signup">Start Free Trial</a>
        </li>
      </ng-container>

      <!-- Auth: logged in -->
      <ng-container *ngIf="auth.isLoggedIn">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle nav-user-pill"
             href="#" role="button"
             data-bs-toggle="dropdown" aria-expanded="false">
            <span class="nav-user-icon">👤</span>
            {{ auth.currentUser?.user_name }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <span class="dropdown-item-text nav-firm-label">
                {{ auth.currentUser?.firm_name }}
                <span class="nav-plan-badge nav-plan-{{ auth.currentUser?.plan_tier }}">
                  {{ auth.currentUser?.plan_tier | titlecase }}
                </span>
              </span>
            </li>
            <li *ngIf="auth.currentUser?.subscription_status === 'trial'">
              <span class="dropdown-item-text nav-trial-note">
                ⏳ {{ auth.trialDaysLeft() }} days left in trial
              </span>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <button class="dropdown-item text-danger" (click)="auth.logout()">Sign Out</button>
            </li>
          </ul>
        </li>
      </ng-container>

    </ul>
  </div>
</nav>
