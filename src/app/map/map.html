<div id="map" style="height: 500px; border-radius: 10px;"></div>

<!-- Zone detection status -->
<div class="zone-status-bar mt-2">

  <div *ngIf="detecting" class="zone-detecting">
    <span class="spinner"></span> Detecting zone...
  </div>

  <div *ngIf="detectedZone && !detecting" class="zone-detected">
    <span class="zone-chip">{{ detectedZone.zone_code }}</span>
    <span class="zone-locality">{{ detectedZone.zone_name }} — {{ detectedZone.locality }}, {{ detectedZone.ward }}</span>
  </div>

  <div *ngIf="zoneError && !detecting" class="zone-error">
    ⚠ {{ zoneError }}
  </div>

</div>

<!-- Plot area (existing) -->
<div class="mt-2" *ngIf="plotArea !== 0">
  <b>Plot Area:</b> {{ plotArea }} sq ft
</div>

<!-- Map legend -->
<div class="zone-legend mt-2">
  <span class="legend-title">Zone types:</span>
  <span class="legend-item" style="--c:#3b82f6">R</span>
  <span class="legend-item" style="--c:#8b5cf6">RM</span>
  <span class="legend-item" style="--c:#f97316">C1</span>
  <span class="legend-item" style="--c:#ef4444">C2</span>
  <span class="legend-item" style="--c:#dc2626">C3</span>
  <span class="legend-item" style="--c:#06b6d4">IT</span>
  <span class="legend-item" style="--c:#22c55e">PSP</span>
</div>
